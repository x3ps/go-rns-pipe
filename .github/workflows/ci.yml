name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Root — test
        run: make test-root
      - name: Root — lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: TCP — test
        run: go test ./... && go test -race ./...
        working-directory: examples/tcp
      - name: TCP — lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: examples/tcp

      - name: UDP — test
        run: go test ./... && go test -race ./...
        working-directory: examples/udp
      - name: UDP — lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: examples/udp
