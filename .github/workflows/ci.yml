name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Flake check
        run: nix flake check

      - name: Build
        run: nix build

      - name: Test
        run: nix develop --command go test ./...

      - name: Test (race detector)
        run: nix develop --command go test -race ./...

      - name: Vet examples/tcp
        run: nix develop --command bash -c "cd examples/tcp && go vet ./..."

      - name: Build examples/tcp
        run: nix develop --command bash -c "cd examples/tcp && go build -o /dev/null ."

      - name: Test examples/tcp
        run: nix develop --command bash -c "cd examples/tcp && go test ./..."

      - name: Lint
        run: nix develop --command golangci-lint run

      - name: Lint examples/tcp
        run: nix develop --command bash -c "cd examples/tcp && golangci-lint run"
