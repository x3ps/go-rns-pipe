name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: ${{ matrix.name }} E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: TCP
            compose_file: examples/tcp/e2e/e2e/docker-compose.yml
          - name: UDP
            compose_file: examples/udp/e2e/e2e/docker-compose.yml
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run E2E tests
        run: docker compose -f "${{ matrix.compose_file }}" up --build --abort-on-container-exit --exit-code-from test-runner

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f "${{ matrix.compose_file }}" logs --no-color || true

      - name: Cleanup
        if: always()
        run: docker compose -f "${{ matrix.compose_file }}" down --volumes --remove-orphans || true
