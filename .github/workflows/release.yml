name: Release

on:
  push:
    tags: ["v*"]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Root — test
        run: make test-root
      - name: Root — lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: TCP — test
        run: go test ./... && go test -race ./...
        working-directory: examples/tcp
      - name: TCP — lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: examples/tcp

      - name: UDP — test
        run: go test ./... && go test -race ./...
        working-directory: examples/udp
      - name: UDP — lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: examples/udp

      - name: Build
        run: make build

  release:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Create release & upload
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --generate-notes
          gh release upload "${{ github.ref_name }}" --clobber \
            examples/tcp/rns-tcp-iface \
            examples/udp/rns-udp-iface
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
