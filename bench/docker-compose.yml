networks:
  bench-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

services:
  rns-node-a:
    build:
      context: ..
      dockerfile: bench/node-a/Dockerfile
    container_name: rns-node-a
    hostname: rns-node-a
    networks:
      bench-net:
        ipv4_address: 10.10.0.2
    ports:
      - "4242:4242"
      - "9100:9100"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import socket; socket.create_connection(('localhost',4242),timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  rns-node-b:
    build:
      context: ..
      dockerfile: bench/node-b/Dockerfile
    container_name: rns-node-b
    hostname: rns-node-b
    networks:
      bench-net:
        ipv4_address: 10.10.0.3
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/reflector_hash"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    depends_on:
      rns-node-a:
        condition: service_healthy
