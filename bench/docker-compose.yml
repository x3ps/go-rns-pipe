networks:
  bench-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

services:
  rns-node-a:
    build:
      context: ..
      dockerfile: bench/node-a/Dockerfile
    container_name: rns-node-a
    hostname: rns-node-a
    networks:
      bench-net:
        ipv4_address: 10.10.0.2
    ports:
      - "4242:4242"
      - "9100:9100"

  rns-node-b:
    build:
      context: node-b
      dockerfile: Dockerfile
    container_name: rns-node-b
    hostname: rns-node-b
    networks:
      bench-net:
        ipv4_address: 10.10.0.3
    ports:
      - "4243:4243"
    depends_on:
      - rns-node-a
