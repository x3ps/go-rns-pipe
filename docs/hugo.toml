        base = "https://github.com/x3ps/go-rns-pipe/edit/main/docs/content"

  [languages.ru]
    languageName = "Русский"
    languageCode = "ru"
    weight = 2
    title = "go-rns-pipe"
    [languages.ru.params]
      description = "Реализация протокола Reticulum PipeInterface на Go с HDLC-фреймингом"
      [languages.ru.params.editURL]
        enable = true
        base = "https://github.com/x3ps/go-rns-pipe/edit/main/docs/content"

