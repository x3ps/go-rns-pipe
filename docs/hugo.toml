baseURL = "https://x3ps.github.io/go-rns-pipe/"
title = "go-rns-pipe"
theme = "hextra"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
