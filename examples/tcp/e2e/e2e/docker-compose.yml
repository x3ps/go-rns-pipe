volumes:
  hash-data:

services:
  node-a:
    build:
      context: ../../../..
      dockerfile: examples/tcp/e2e/nodes/node-a/Dockerfile
    healthcheck:
      test: ["CMD", "sh", "-c",
             "python3 -c \"import socket; socket.create_connection(('localhost',4243),timeout=2)\" && python3 -c \"import socket; socket.create_connection(('localhost',4244),timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  node-b:
    build:
      context: ../../../..
      dockerfile: examples/tcp/e2e/nodes/node-b/Dockerfile
    volumes:
      - hash-data:/shared
    healthcheck:
      test: ["CMD", "sh", "-c",
             "test -f /shared/reflector_hash && test -f /shared/reflector_link_hash"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    depends_on:
      node-a:
        condition: service_healthy

  test-runner:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - hash-data:/shared:ro
    depends_on:
      node-b:
        condition: service_healthy
